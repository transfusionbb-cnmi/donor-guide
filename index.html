<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; }
        .nav-header { background: #1e3799; color: white; padding: 60px 20px 80px; text-align: center; }
        .search-box { 
            border-radius: 50px; 
            border: 2px solid #1e3799; 
            padding: 15px 30px; 
            margin-top: -35px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-size: 1.2rem;
        }
        .result-card { border: none; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); background: white; }
        .badge-cat { background: #4a69bd; color: white; padding: 4px 12px; border-radius: 5px; font-size: 0.8rem; }
        .criteria-section { background: #fffcf0; padding: 15px; border-radius: 10px; border: 1px dashed #f1c40f; margin: 15px 0; }
        .script-th { border-left: 4px solid #27ae60; background: #fafffa; padding: 15px; margin-top: 10px; }
        .script-en { border-left: 4px solid #2980b9; background: #f0f7ff; padding: 15px; margin-top: 10px; font-style: italic; }
        .label { font-weight: 600; color: #1e3799; font-size: 0.9rem; margin-bottom: 5px; }
        .welcome-msg { color: #636e72; margin-top: 50px; text-align: center; }
    </style>
</head>
<body>

<div class="nav-header">
    <h2 class="fw-bold">ระบบสืบค้นเกณฑ์การรับบริจาคโลหิต</h2>
    <p class="opacity-75">โรงพยาบาลรามาธิบดีจักรีนฤบดินทร์</p>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <input type="text" id="searchInput" class="form-control search-box" placeholder="พิมพ์คำที่ต้องการค้นหา... (เช่น ความดัน, ยา, อายุ)">
            
            <div id="welcome" class="welcome-msg">
                <p>🔍 เริ่มพิมพ์เพื่อค้นหาเกณฑ์การคัดกรอง</p>
            </div>

            <div id="results" class="mt-4"></div>
        </div>
    </div>
</div>

<script>
    let rawData = [];
    const GAS_URL = 'ใส่_WEB_APP_URL_ของคุณที่นี่'; 

    window.onload = () => {
        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                rawData = data;
                console.log("Data Loaded");
            });
    };

    document.getElementById('searchInput').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase();
        const welcome = document.getElementById('welcome');
        
        // ถ้าไม่มีคำค้นหา ให้ล้างหน้าจอ
        if (keyword.length === 0) {
            document.getElementById('results').innerHTML = '';
            welcome.style.display = 'block';
            return;
        }

        welcome.style.display = 'none';

        // ค้นหาจาก Column หัวข้อ และ คำค้นหา
        const filtered = rawData.filter(item => {
            // ดึงข้อมูลแบบ Key-Value
            const title = String(Object.values(item)[1]).toLowerCase(); // คอลัมน์ B (หัวข้อ)
            const searchTag = String(Object.values(item)[2]).toLowerCase(); // คอลัมน์ C (คำที่ใช้ค้นหา)
            return title.includes(keyword) || searchTag.includes(keyword);
        });

        render(filtered);
    });

    function render(data) {
        const container = document.getElementById('results');
        if (data.length === 0) {
            container.innerHTML = '<div class="text-center p-5 text-muted">ไม่พบข้อมูลที่ตรงกับคำค้นหา</div>';
            return;
        }

        container.innerHTML = data.map(item => {
            // ดึงข้อมูลตามลำดับคอลัมน์ เพื่อความแม่นยำ (A=0, B=1, ...)
            const vals = Object.values(item);
            return `
            <div class="card result-card">
                <div class="card-body p-4">
                    <span class="badge-cat mb-2">${vals[0]}</span>
                    <h4 class="text-primary fw-bold mb-3">${vals[1]}</h4>
                    
                    <div class="criteria-section">
                        <div class="label">📍 เกณฑ์การคัดกรอง</div>
                        <div class="text-dark mb-3">${vals[3] || '-'}</div>
                        <div class="label">⏳ ระยะเวลางดบริจาค</div>
                        <div class="text-danger fw-bold">${vals[4] || 'ไม่มีกำหนดงด'}</div>
                    </div>

                    <div class="script-th">
                        <div class="label text-success">🇹🇭 SCRIPT สำหรับเจ้าหน้าที่</div>
                        <div>${vals[5] || '-'}</div>
                    </div>

                    <div class="script-en">
                        <div class="label text-primary">🇺🇸 ENGLISH SCRIPT</div>
                        <div class="small">${vals[6] || '-'}</div>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }
</script>

</body>
</html>
